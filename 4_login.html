<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple 스타일 로그인</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }
        .container h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 30px;
        }
        .container input[type="text"],
        .container input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
        }
        .container input:focus {
            border-color: #0071e3;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 113, 227, 0.5);
        }
        .container button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .container button:hover {
            background-color: #005bb5;
        }
        .container button:active {
            background-color: #004a93;
        }
        .link-container {
            margin-top: 20px;
        }
        .link-container a {
            color: #0071e3;
            text-decoration: none;
            font-size: 14px;
        }
        .link-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Apple ID 로그인</h2>
    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Apple ID" required>
        <input type="password" name="password" placeholder="비밀번호" required>
        <button type="submit">로그인</button>
    </form>
    <div class="link-container">
        <a href="5_join.html">계정이 없으신가요? 회원가입</a>
    </div>
    <div class="link-container">
        <a href="#">Apple ID 또는 비밀번호를 잊으셨나요?</a>
    </div>
</div>

</body>
</html>
