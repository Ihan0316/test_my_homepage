<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mini test3</title>
    <link rel="stylesheet" href="asset/css/test2.css"> <!-- CSS 파일 링크 -->
</head>

<body>

    <!-- 네비게이션 섹션 -->
    <nav>
        <ul>
            <li><a href="1.html">하루소개</a></li>
            <li><a href="2.html">쿵이소개</a></li>
            <li><a href="3.html">집가구싶당....</a></li>
            <li><a href="8_test.html">mini test1.html</a></li>
            <li><a href="9_test.html">mini test2.html</a></li>
            <li><a href="10_test.html">mini test3.html</a></li>
        </ul>
    </nav>

    <!-- 음식 카테고리 선택 -->
    <div class="food">
        <ul>
            <li><a href="#" onclick="changeMenu('수제마늘곱창', 'asset/img/한식.png', '₩26,000')">한식</a></li>
            <li><a href="#" onclick="changeMenu('트러플베이컨까르보나라', 'asset/img/양식.png', '₩15,000')">양식</a></li>
            <li><a href="#" onclick="changeMenu('차슈덮밥', 'asset/img/일식.png', '₩6,000')">일식</a></li>
        </ul>
    </div>

    <!-- 결과 섹션 -->
    <div id="result">
        <!-- 선택된 메뉴 정보가 여기에 표시됩니다 -->
    </div>

    <script>
        function changeMenu(name, img, price) {
            var result = document.querySelector('#result');
            result.innerHTML = `
                <div class="menu-info">
                    <img src="${img}" alt="${name}" class="menu-img">
                    <div class="menu-name">메뉴: ${name}</div>
                    <div class="menu-price">가격: ${price}</div>
                </div>
            `;
        }
    </script>

</body>

</html>
