<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple 스타일 회원가입</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }
        .container h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 30px;
        }
        .container input[type="text"],
        .container input[type="password"],
        .container input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
        }
        .container input:focus {
            border-color: #0071e3;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 113, 227, 0.5);
        }
        .container button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .container button:hover {
            background-color: #005bb5;
        }
        .container button:active {
            background-color: #004a93;
        }
        .link-container {
            margin-top: 20px;
        }
        .link-container a {
            color: #0071e3;
            text-decoration: none;
            font-size: 14px;
        }
        .link-container a:hover {
            text-decoration: underline;
        }
        .profile-picture {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #e1e1e1;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Apple ID 회원가입</h2>
    <div class="profile-picture">
        <!-- 기본 프로필 이미지 설정 -->
        <img id="profileImage" src="default-profile.png" alt="프로필 이미지">
    </div>
    <input type="file" id="imageUpload" accept="image/*" onchange="loadFile(event)" style="margin-bottom: 20px;">
    
    <form action="/signup" method="post">
        <input type="text" name="fullname" placeholder="이름" required>
        <input type="email" name="email" placeholder="이메일" required>
        <input type="password" name="password" placeholder="비밀번호" required>
        <input type="password" name="confirm_password" placeholder="비밀번호 확인" required>
        <button type="submit">회원가입</button>
    </form>
    <div class="link-container">
        <a href="4_login.html">이미 계정이 있으신가요? 로그인</a>
    </div>
</div>

<script>
    // 프로필 이미지 미리보기 기능
    function loadFile(event) {
        var image = document.getElementById('profileImage');
        image.src = URL.createObjectURL(event.target.files[0]);
    }
</script>

</body>
</html>
